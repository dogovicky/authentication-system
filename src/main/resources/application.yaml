spring:
  application:
    name: Auth-Service

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
    user: ${DB_USER}
    password: ${DB_PASSWORD}
    url: ${DB_URL}
    schemas: public

jwt:
  secret: ${JWT_SECRET}
